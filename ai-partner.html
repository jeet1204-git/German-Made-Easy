<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA — Voice AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050508;
      --surface:   #0d0d14;
      --border:    rgba(255,255,255,0.07);
      --accent:    #7fffff;
      --accent2:   #ff6fff;
      --text:      #e8e8f0;
      --muted:     #666680;
      --danger:    #ff4f6b;
      --success:   #4fffb0;
      --glow:      rgba(127,255,255,0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* ── starfield canvas ─────────────────────────── */
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── layout ───────────────────────────────────── */
    .shell {
      position: relative; z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 20px;
      gap: 18px;
    }

    /* ── header ───────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: .18em;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { font-weight: 400; font-size: .75rem; display: block; letter-spacing: .3em; color: var(--muted); -webkit-text-fill-color: var(--muted); margin-top: -4px; }

    .header-right { display: flex; align-items: center; gap: 14px; }
    .session-timer {
      font-size: .75rem;
      letter-spacing: .12em;
      color: var(--muted);
      transition: color .3s;
    }
    .session-timer.active { color: var(--accent); }

    .lang-badge {
      font-size: .68rem;
      letter-spacing: .1em;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      color: var(--muted);
      background: var(--surface);
    }

    /* ── orb ──────────────────────────────────────── */
    .orb-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .orb-container {
      position: relative;
      width: 200px; height: 200px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .orb-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(127,255,255,0.15);
      animation: spin 8s linear infinite;
    }
    .orb-ring:nth-child(2) { inset: 12px; border-color: rgba(255,111,255,0.12); animation-direction: reverse; animation-duration: 12s; }
    .orb-ring:nth-child(3) { inset: 24px; border-color: rgba(127,255,255,0.08); animation-duration: 20s; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .orb {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 36%, #1cfff0 0%, #0a8cff 40%, #5f00c8 80%, #0d0020 100%);
      box-shadow:
        0 0 40px rgba(28,255,240,.25),
        0 0 80px rgba(28,255,240,.1),
        inset 0 0 30px rgba(0,0,0,.5);
      transition: box-shadow .3s, transform .3s;
      position: relative;
      overflow: hidden;
    }
    .orb::after {
      content:'';
      position: absolute;
      top: 14%; left: 22%;
      width: 30%; height: 18%;
      background: rgba(255,255,255,.25);
      border-radius: 50%;
      filter: blur(6px);
    }
    .orb-container:hover .orb {
      box-shadow: 0 0 60px rgba(28,255,240,.4), 0 0 120px rgba(28,255,240,.15), inset 0 0 30px rgba(0,0,0,.5);
      transform: scale(1.04);
    }

    /* states */
    .orb-container.listening .orb {
      animation: pulse-listen 1.2s ease-in-out infinite;
      box-shadow: 0 0 50px rgba(28,255,240,.5), 0 0 100px rgba(28,255,240,.2);
    }
    .orb-container.speaking .orb {
      animation: pulse-speak 0.7s ease-in-out infinite;
      background: radial-gradient(circle at 38% 36%, #ff6fff 0%, #c000ff 40%, #2a0060 80%, #0d0020 100%);
      box-shadow: 0 0 50px rgba(255,111,255,.5), 0 0 100px rgba(255,111,255,.2);
    }
    @keyframes pulse-listen {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes pulse-speak {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* wave bars */
    .wave-bars {
      display: flex; gap: 4px; align-items: flex-end;
      height: 32px;
      opacity: 0;
      transition: opacity .3s;
    }
    .wave-bars.visible { opacity: 1; }
    .wave-bar {
      width: 4px; background: var(--accent);
      border-radius: 2px;
      animation: bar-bounce 0.8s ease-in-out infinite;
      min-height: 4px;
    }
    .wave-bars.speaking .wave-bar { background: var(--accent2); }
    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: .1s; }
    .wave-bar:nth-child(3) { animation-delay: .2s; }
    .wave-bar:nth-child(4) { animation-delay: .3s; }
    .wave-bar:nth-child(5) { animation-delay: .4s; }
    .wave-bar:nth-child(6) { animation-delay: .3s; }
    .wave-bar:nth-child(7) { animation-delay: .2s; }
    @keyframes bar-bounce {
      0%,100% { height: 4px; }
      50% { height: 28px; }
    }

    .status-text {
      font-size: .75rem;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      min-height: 1.2em;
      text-align: center;
    }

    /* ── controls ─────────────────────────────────── */
    .controls { display: flex; align-items: center; gap: 14px; justify-content: center; }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      border: none; border-radius: 6px;
      cursor: pointer;
      padding: 12px 28px;
      transition: all .2s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background .15s;
    }
    .btn:hover::after { background: rgba(255,255,255,0.06); }
    .btn:active { transform: scale(.97); }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), #0af);
      color: #000;
      padding: 14px 40px;
      font-size: .9rem;
    }
    .btn-mic {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
    }
    .btn-mic.muted { border-color: var(--danger); color: var(--danger); }
    .btn-end {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--danger);
      padding: 12px 20px;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

    /* ── transcript ───────────────────────────────── */
    .transcript-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .transcript-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: .7rem; letter-spacing: .15em; color: var(--muted);
    }
    .transcript-head .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 8px; }
    .transcript-head .dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #transcript::-webkit-scrollbar { width: 4px; }
    #transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: msg-in .25s ease-out;
    }
    @keyframes msg-in { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }

    .msg-role {
      font-size: .62rem;
      letter-spacing: .1em;
      padding-top: 2px;
      white-space: nowrap;
      color: var(--muted);
      min-width: 48px;
    }
    .msg.user .msg-role { color: var(--accent); }
    .msg.aura .msg-role { color: var(--accent2); }

    .msg-text {
      font-size: .82rem;
      line-height: 1.6;
      color: var(--text);
    }

    .empty-hint {
      color: var(--muted);
      font-size: .75rem;
      text-align: center;
      margin: auto;
      letter-spacing: .1em;
    }

    /* ── error toast ──────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1a0010; border: 1px solid var(--danger);
      color: var(--danger); font-size: .78rem; letter-spacing: .08em;
      padding: 10px 20px; border-radius: 6px;
      display: none; z-index: 100;
      max-width: 90vw; text-align: center;
    }
    #toast.show { display: block; animation: toast-in .25s ease-out; }
    @keyframes toast-in { from { opacity:0; transform: translateX(-50%) translateY(10px); } }

    /* ── session info bar ─────────────────────────── */
    .info-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: .68rem; letter-spacing: .1em; color: var(--muted);
      padding: 0 2px;
    }
    .usage-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .usage-bar-bg { width: 100px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .usage-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .5s; }

    @media (max-width: 480px) {
      .orb-container { width: 160px; height: 160px; }
      .orb { width: 90px; height: 90px; }
      .btn-start { padding: 12px 28px; font-size: .8rem; }
      .logo { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="shell">
  <!-- HEADER -->
  <header>
    <div class="logo">AURA<span>VOICE INTELLIGENCE</span></div>
    <div class="header-right">
      <span class="lang-badge" id="langBadge">EN</span>
      <span class="session-timer" id="timer">00:00</span>
    </div>
  </header>

  <!-- ORB + CONTROLS -->
  <div class="orb-wrap">
    <div class="orb-container" id="orbContainer">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb" id="orb"></div>
    </div>

    <div class="wave-bars" id="waveBars">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="status-text" id="statusText">Ready to connect</div>

    <!-- TRANSCRIPT -->
    <div class="transcript-wrap" style="width:100%;max-width:700px;height:220px;">
      <div class="transcript-head">
        <span><span class="dot" id="liveDot"></span>CONVERSATION</span>
        <span id="transcriptMeta">—</span>
      </div>
      <div id="transcript">
        <p class="empty-hint">Start a session to begin talking with AURA</p>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls" id="controls">
      <button class="btn btn-start" id="btnStart">Start Session</button>
      <button class="btn btn-mic" id="btnMic" style="display:none">🎙 Mute</button>
      <button class="btn btn-end" id="btnEnd" style="display:none">End</button>
    </div>

    <!-- INFO BAR -->
    <div class="info-bar" id="infoBar" style="width:100%;max-width:700px;display:none">
      <span id="sessionCount">Session 0/10</span>
      <div class="usage-bar-wrap">
        <span id="usageLabel">0 / 300 min</span>
        <div class="usage-bar-bg"><div class="usage-bar-fill" id="usageFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ───────────────────────── AUDIO WORKLET ───────────────────────── -->
<script id="workletCode" type="text/plain">
class MicProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0][0];
    if (ch) {
      // downsample to 16 kHz int16
      const out = new Int16Array(ch.length);
      for (let i = 0; i < ch.length; i++) {
        out[i] = Math.max(-32768, Math.min(32767, ch[i] * 32767));
      }
      this.port.postMessage(out.buffer, [out.buffer]);
    }
    return true;
  }
}
registerProcessor('mic-processor', MicProcessor);
</script>

<!-- ───────────────────────── STARS ───────────────────────── -->
<script>
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function init(){
    stars = Array.from({length:120},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:Math.random()*1.2+.2, a:Math.random(), da:Math.random()*.003-.0015
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.da; if(s.a<0||s.a>1) s.da*=-1;
      ctx.globalAlpha=s.a*.7;
      ctx.fillStyle='#a0e0ff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize',()=>{ resize(); init(); });
})();
</script>

<!-- ───────────────────────── MAIN APP ───────────────────────── -->
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Replace with your deployed Cloudflare Worker URL
const WORKER_URL = 'https://aura-token-worker.YOUR_SUBDOMAIN.workers.dev';
const GEMINI_WS  = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContentConstrained';
const MODEL      = 'gemini-2.5-flash-native-audio-preview-12-2025';
const MAX_MINUTES = 300; // 5 hours total
const MAX_SESSIONS = 10;
const SESSION_MINUTES = 30;

// ── STATE ────────────────────────────────────────────────────────────────────
let ws = null;
let audioCtx = null;
let micStream = null;
let workletNode = null;
let sessionActive = false;
let micMuted = false;
let sessionStart = null;
let timerInterval = null;
let totalMinutesUsed = parseFloat(localStorage.getItem('aura_minutes') || '0');
let sessionsUsed = parseInt(localStorage.getItem('aura_sessions') || '0');
let detectedLang = 'EN';
let audioQueue = [];
let isPlayingAudio = false;
let currentAiText = '';

// ── DOM refs ─────────────────────────────────────────────────────────────────
const btnStart   = document.getElementById('btnStart');
const btnMic     = document.getElementById('btnMic');
const btnEnd     = document.getElementById('btnEnd');
const orbC       = document.getElementById('orbContainer');
const statusText = document.getElementById('statusText');
const timerEl    = document.getElementById('timer');
const timerHeader= document.getElementById('timer');
const waveBars   = document.getElementById('waveBars');
const transcript = document.getElementById('transcript');
const liveDot    = document.getElementById('liveDot');
const langBadge  = document.getElementById('langBadge');
const infoBar    = document.getElementById('infoBar');
const usageFill  = document.getElementById('usageFill');
const usageLabel = document.getElementById('usageLabel');
const sessionCount=document.getElementById('sessionCount');
const transcriptMeta=document.getElementById('transcriptMeta');
const toast      = document.getElementById('toast');

// ── HELPERS ──────────────────────────────────────────────────────────────────
function showToast(msg, duration=4000){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), duration);
}

function setStatus(text){ statusText.textContent = text; }

function setOrbState(state){
  orbC.className = 'orb-container' + (state ? ' '+state : '');
  waveBars.className = 'wave-bars' + (state==='idle'?'':' visible') + (state==='speaking'?' speaking':'');
}

function formatTime(sec){
  const m = String(Math.floor(sec/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return `${m}:${s}`;
}

function updateUsageUI(){
  const pct = Math.min(100, (totalMinutesUsed/MAX_MINUTES)*100);
  usageFill.style.width = pct+'%';
  usageLabel.textContent = `${Math.round(totalMinutesUsed)} / ${MAX_MINUTES} min`;
  sessionCount.textContent = `Session ${sessionsUsed}/${MAX_SESSIONS}`;
}

function addMessage(role, text){
  const empty = transcript.querySelector('.empty-hint');
  if(empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<span class="msg-role">${role==='user'?'YOU':'AURA'}</span><span class="msg-text">${text}</span>`;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
  transcriptMeta.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  detectLanguage(text);
}

function detectLanguage(text){
  // Simple heuristic detection
  if (/[\u0900-\u097F]/.test(text)) { detectedLang='HI'; }
  else if (/[\u0A80-\u0AFF]/.test(text)) { detectedLang='GU'; }
  else if (/[äöüÄÖÜß]/.test(text) || /\b(und|der|die|das|ist|Sie|ich)\b/.test(text)) { detectedLang='DE'; }
  else { detectedLang='EN'; }
  langBadge.textContent = detectedLang;
}

// ── AUDIO WORKLET ─────────────────────────────────────────────────────────────
async function createWorklet(ctx, stream){
  const workletCode = document.getElementById('workletCode').textContent;
  const blob = new Blob([workletCode], {type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  await ctx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);

  const source = ctx.createMediaStreamSource(stream);
  const node   = new AudioWorkletNode(ctx, 'mic-processor');
  source.connect(node);
  node.connect(ctx.destination); // silent output (needed to keep worklet alive)

  node.port.onmessage = (e) => {
    if(!sessionActive || micMuted || !ws || ws.readyState!==WebSocket.OPEN) return;
    // Send raw PCM16 audio chunk
    const b64 = btoa(String.fromCharCode(...new Uint8Array(e.data)));
    ws.send(JSON.stringify({
      realtimeInput: {
        mediaChunks: [{
          mimeType: 'audio/pcm;rate=16000',
          data: b64
        }]
      }
    }));
  };
  return node;
}

// ── AUDIO PLAYBACK ────────────────────────────────────────────────────────────
function enqueueAudio(pcmB64){
  audioQueue.push(pcmB64);
  if(!isPlayingAudio) playNext();
}

async function playNext(){
  if(audioQueue.length === 0){ isPlayingAudio=false; setOrbState('listening'); return; }
  isPlayingAudio = true;
  setOrbState('speaking');

  const b64 = audioQueue.shift();
  const raw  = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  // Gemini outputs 24kHz PCM16
  const samples = raw.length / 2;
  const buffer  = audioCtx.createBuffer(1, samples, 24000);
  const channel = buffer.getChannelData(0);
  const view    = new DataView(raw.buffer);
  for(let i=0;i<samples;i++){
    channel[i] = view.getInt16(i*2, true) / 32768;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(audioCtx.destination);
  src.onended = playNext;
  src.start();
}

// ── SESSION TIMER ─────────────────────────────────────────────────────────────
function startTimer(){
  sessionStart = Date.now();
  timerHeader.classList.add('active');
  timerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now()-sessionStart)/1000);
    timerEl.textContent = formatTime(elapsed);
    const minutesElapsed = elapsed/60;
    if(minutesElapsed >= SESSION_MINUTES){
      showToast('Session limit reached (30 min). Starting new session...');
      endSession(false);
    }
  }, 1000);
}

function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  timerHeader.classList.remove('active');
  if(sessionStart){
    const mins = (Date.now()-sessionStart)/60000;
    totalMinutesUsed += mins;
    sessionsUsed++;
    localStorage.setItem('aura_minutes', totalMinutesUsed.toFixed(2));
    localStorage.setItem('aura_sessions', sessionsUsed);
    sessionStart=null;
  }
  updateUsageUI();
}

// ── MAIN SESSION ──────────────────────────────────────────────────────────────
btnStart.addEventListener('click', startSession);
btnEnd.addEventListener('click', ()=>endSession(true));
btnMic.addEventListener('click', toggleMic);

async function startSession(){
  // Check limits
  if(sessionsUsed >= MAX_SESSIONS){
    showToast('Maximum sessions reached (10/10). Please upgrade to continue.'); return;
  }
  if(totalMinutesUsed >= MAX_MINUTES){
    showToast('Total usage limit reached (300 min). Please upgrade.'); return;
  }

  btnStart.disabled = true;
  setStatus('Requesting microphone…');

  try {
    // 1. Resume AudioContext on user gesture
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate:24000});
    await audioCtx.resume();

    // 2. Get microphone
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:true, noiseSuppression:true, sampleRate:16000 }
    });

    setStatus('Fetching secure token…');

    // 3. Fetch ephemeral token from Worker
    const resp = await fetch(`${WORKER_URL}/token`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({})
    });

    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error || `Token request failed: ${resp.status}`);
    }
    const { token } = await resp.json();

    setStatus('Opening connection…');

    // 4. Open WebSocket to Gemini Live
    ws = new WebSocket(`${GEMINI_WS}?access_token=${encodeURIComponent(token)}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = async () => {
      // 5. Send setup message
      ws.send(JSON.stringify({
        setup: {
          model: MODEL,
          generationConfig: {
            responseModalities: ['AUDIO','TEXT'],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName: 'Aoede' }
              }
            }
          },
          systemInstruction: {
            parts:[{ text: `You are AURA, an advanced multilingual voice AI assistant. 
You support English, German, Hindi, and Gujarati. 
Auto-detect the user's language and respond in the same language. 
If they switch languages mid-conversation, follow naturally.
Be concise, helpful, and conversational. Keep responses brief unless asked for detail.
Today's date: ${new Date().toDateString()}.` }]
          }
        }
      }));

      // 6. Start microphone worklet
      workletNode = await createWorklet(audioCtx, micStream);

      sessionActive = true;
      setOrbState('listening');
      setStatus('Listening…');
      liveDot.classList.add('live');

      // show controls
      btnStart.style.display='none';
      btnMic.style.display='';
      btnEnd.style.display='';
      infoBar.style.display='flex';

      startTimer();
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        handleServerMessage(msg);
      } catch(e){ /* binary frame, skip */ }
    };

    ws.onerror = (e) => {
      showToast('WebSocket error. Check connection.');
      console.error('WS error', e);
    };

    ws.onclose = (e) => {
      if(sessionActive){
        showToast(`Connection closed (${e.code}). Session ended.`);
        endSession(false);
      }
    };

  } catch(err) {
    console.error(err);
    showToast(err.message || 'Failed to start session.');
    setStatus('Ready to connect');
    btnStart.disabled = false;
    cleanup();
  }
}

function handleServerMessage(msg){
  // Server content (audio + text)
  if(msg.serverContent){
    const sc = msg.serverContent;

    if(sc.modelTurn?.parts){
      sc.modelTurn.parts.forEach(part=>{
        if(part.inlineData?.mimeType?.startsWith('audio/')){
          enqueueAudio(part.inlineData.data);
        }
        if(part.text){
          currentAiText += part.text;
        }
      });
    }

    // turnComplete signals end of AI turn
    if(sc.turnComplete){
      if(currentAiText.trim()){
        addMessage('aura', currentAiText.trim());
        currentAiText = '';
      }
      if(audioQueue.length===0 && !isPlayingAudio){
        setOrbState('listening');
        setStatus('Listening…');
      }
    }
  }

  // Input transcription (user speech)
  if(msg.realtimeInput?.transcription){
    addMessage('user', msg.realtimeInput.transcription);
  }

  // Setup complete
  if(msg.setupComplete){
    setStatus('Session active');
  }

  // Errors
  if(msg.error){
    showToast(`API Error: ${msg.error.message || JSON.stringify(msg.error)}`);
  }
}

function toggleMic(){
  micMuted = !micMuted;
  btnMic.textContent = micMuted ? '🔇 Unmute' : '🎙 Mute';
  btnMic.classList.toggle('muted', micMuted);
  setStatus(micMuted ? 'Microphone muted' : 'Listening…');
}

function endSession(userInitiated=true){
  sessionActive = false;
  stopTimer();
  cleanup();

  setOrbState('');
  setStatus('Session ended');
  liveDot.classList.remove('live');

  btnStart.style.display='';
  btnStart.disabled = false;
  btnMic.style.display='none';
  btnEnd.style.display='none';
  timerEl.textContent='00:00';

  if(userInitiated) addMessage('aura','Session ended. Start a new session when ready.');
}

function cleanup(){
  if(ws){ try{ws.close();}catch(e){} ws=null; }
  if(workletNode){ try{workletNode.disconnect();}catch(e){} workletNode=null; }
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  if(audioCtx){ try{audioCtx.close();}catch(e){} audioCtx=null; }
  audioQueue=[]; isPlayingAudio=false; currentAiText='';
  micMuted=false; btnMic.textContent='🎙 Mute'; btnMic.classList.remove('muted');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateUsageUI();
infoBar.style.display='none';
</script>
</body>
